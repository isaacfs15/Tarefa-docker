# ==============================================================
# nginx.conf - Configuração do servidor Nginx para a SPA React
# ==============================================================
server {
    listen 80;
    server_name _;

    # Diretório raiz onde estão os arquivos estáticos gerados pelo Vite
    root /usr/share/nginx/html;
    index index.html;

    # ---- Suporte a Single Page Application (SPA) ----
    # Para qualquer rota que não corresponda a um arquivo real no disco,
    # o Nginx entrega o index.html e deixa o React Router assumir o controle.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Cache para assets estáticos ----
    # Arquivos com hash no nome (gerados pelo Vite) nunca mudam,
    # então podemos cachê-los agressivamente no navegador.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
